---
- hosts: server1
  become: true
  remote_user: ec2-user
  tasks:
    - name: Install Java 21
      ansible.builtin.yum:
        name: java-21-openjdk
        state: latest
    - name: Install unzip
      ansible.builtin.yum:
        name: unzip
        state: latest
    - name: Install git
      ansible.builtin.yum:
        name: git
        state: latest        